name: kinetic_ai
description: AI-Powered Physical Monitoring & Biomechanics Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Sensors
  sensors_plus: ^7.0.0
  light: ^5.0.0
  noise_meter: ^5.1.0

  # Location + Maps
  geolocator: ^14.0.2
  google_maps_flutter: ^2.5.0
  flutter_map: ^8.3.0              # Offline map support
  cached_network_image: ^3.3.1     # Map tile caching

  # ML / AI
  tflite_flutter: ^0.12.1          # TFLite models
  google_generative_ai: ^0.4.0     # Gemini AI coaching

  # Charts + Visualization
  fl_chart: ^1.2.0
  flutter_heatmap_calendar: ^1.0.5

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0        # Store session exports

  # State Management
  flutter_riverpod: ^3.0.0-dev.3
  riverpod_annotation: ^3.0.0-dev.3

  # Navigation
  go_router: ^17.2.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Animations
  lottie: ^3.1.0
  animated_text_kit: ^4.2.2

  # Audio
  audioplayers: ^6.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  path_provider: ^2.1.2
  share_plus: ^12.0.2               # Export CSV/JSON sessions
  csv: ^8.0.0                      # CSV export for sensor logs
  camera: ^0.12.0+1
  image: ^4.8.0
  environment_sensors: ^0.3.0
  google_fonts: ^8.0.2
  proximity_sensor: ^1.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  riverpod_generator: ^3.0.0-dev.11
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/animations/
    - assets/sounds/
    - assets/models/
    - assets/maps/
